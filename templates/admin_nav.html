<style>
    .admin-nav-shell {
        position: sticky;
        top: 0;
        z-index: 1040;
        padding: 14px 16px 0;
    }

    .admin-nav {
        width: min(100%, 1320px);
        margin: 0 auto 18px;
        padding: 14px 18px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.24);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        color: #e2e8f0;
    }

    html.light .admin-nav {
        background: rgba(255, 255, 255, 0.9);
        border-color: rgba(15, 23, 42, 0.08);
        color: #0f172a;
        box-shadow: 0 18px 48px rgba(148, 163, 184, 0.2);
    }

    .admin-nav-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
    }

    .admin-brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
        font-weight: 800;
        white-space: nowrap;
    }

    .admin-brand img {
        width: 36px;
        height: 36px;
    }

    .admin-nav-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .admin-nav-link,
    .admin-nav-logout {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
    }

    .admin-nav-link {
        color: inherit;
    }

    .admin-nav-link:hover,
    .admin-nav-link.active {
        background: rgba(99, 102, 241, 0.14);
        color: #4f46e5;
    }

    .admin-nav-logout {
        background: linear-gradient(135deg, #4f46e5, #4338ca);
        color: #fff;
    }

    .admin-nav-logout:hover {
        color: #fff;
    }

    body > .navbar-top,
    body > header.bg-white {
        display: none !important;
    }
</style>
<div class="admin-nav-shell">
    <div class="admin-nav">
        <div class="admin-nav-row">
            <a class="admin-brand" href="{{ url_for('AdminScreen') }}">
                <img src="{{ url_for('static', filename='assets/images/logo.svg') }}" alt="Bidzone">
                <span>Bidzone Admin</span>
            </a>
            <div class="admin-nav-links">
                <a class="admin-nav-link {% if request.endpoint in ['AdminScreen', 'AdminScreenPage', 'AdminAnalytics'] %}active{% endif %}" href="{{ url_for('AdminScreen') }}">Dashboard</a>
                <a class="admin-nav-link {% if request.endpoint == 'ViewTransaction' %}active{% endif %}" href="{{ url_for('ViewTransaction') }}">Transactions</a>
                <a class="admin-nav-link {% if request.endpoint == 'ViewBidder' %}active{% endif %}" href="{{ url_for('ViewBidder') }}">Bidders</a>
                <a class="admin-nav-link {% if request.endpoint == 'ViewSeller' %}active{% endif %}" href="{{ url_for('ViewSeller') }}">Sellers</a>
                <a class="admin-nav-link {% if request.endpoint == 'SuspiciousBids' %}active{% endif %}" href="{{ url_for('SuspiciousBids') }}">Suspicious Bids</a>
                <a class="admin-nav-link {% if request.endpoint == 'Profile' %}active{% endif %}" href="{{ url_for('Profile', role='Admin') }}">Profile</a>
            </div>
            <a class="admin-nav-logout" href="{{ url_for('AdminLogout') }}">Logout</a>
        </div>
    </div>
</div>
