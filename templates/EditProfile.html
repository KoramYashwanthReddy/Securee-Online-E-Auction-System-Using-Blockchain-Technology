<!DOCTYPE html>
<html lang="en" id="theme" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Bidzone - Edit Profile</title>
    <link rel="shortcut icon" href="static/assets/images/auction-fevicon.png">
    <link rel="stylesheet" href="static/assets/css/all.min.css" type="text/css">
    <link rel="stylesheet" href="static/assets/css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="static/assets/css/style.css" type="text/css">
    <link rel="stylesheet" href="static/assets/css/responsive.css" type="text/css">
    <style>
        body { margin:0; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg, #eef2ff 0%, #e2e8f0 46%, #f8fafc 100%); color:#0f172a; }
        .wrap { min-height:100vh; padding:30px 16px 84px; }
        .shell { width:min(100%, 920px); margin:0 auto; }
        .cardx { padding:30px; border-radius:24px; background:#fff; box-shadow:0 28px 80px rgba(148,163,184,.28); border:1px solid rgba(15,23,42,.08); }
        h1 { margin:0; font-size: clamp(28px,4vw,40px); }
        .sub { margin:10px 0 0; color:#475569; line-height:1.6; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:18px; }
        .field label { display:block; font-weight:700; margin-bottom:8px; font-size:13px; }
        .field input { width:100%; height:48px; padding:0 14px; border-radius:14px; border:1px solid rgba(100,116,139,.22); background:#fff; font-size:14px; }
        .btn { display:inline-flex; align-items:center; justify-content:center; height:48px; padding:0 18px; border-radius:14px; background:linear-gradient(135deg,#4f46e5,#4338ca); color:#fff; border:0; text-decoration:none; font-weight:800; margin-top:18px; cursor:pointer; }
        .error { margin-top:14px; padding:12px 14px; border-radius:14px; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.24); color:#dc2626; font-weight:700; }
        .links a { display:inline-flex; margin-right:10px; margin-top:12px; color:#4f46e5; text-decoration:none; font-weight:700; }
        .meta { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin-top:18px; }
        .pill { padding:14px; border-radius:16px; background:rgba(99,102,241,.06); border:1px solid rgba(99,102,241,.14); }
        .pill strong { display:block; margin-bottom:6px; }
        @media (max-width: 720px) { .grid, .meta { grid-template-columns: 1fr; } .cardx { padding:22px; } }
    </style>
</head>
<body>
    {% include 'role_nav.html' %}
    <div class="wrap">
        <div class="shell">
            <div class="cardx">
                <div style="color:#6366f1;text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:800;">Profile Editing</div>
                <h1>Edit Your Profile</h1>
                <p class="sub">Update your visible account details while keeping your blockchain login identity intact.</p>
                <div class="links">
                    <a href="/Profile?role={{ profile.role }}">Back to Profile</a>
                    <a href="/ViewProduct">Live Products</a>
                </div>
                <div class="meta">
                    <div class="pill"><strong>Username</strong>{{ profile.username }}</div>
                    <div class="pill"><strong>Role</strong>{{ profile.role }}</div>
                </div>
                {% if error %}<div class="error">{{ error }}</div>{% endif %}
                <form method="post" action="/EditProfile">
                    <div class="grid">
                        <div class="field">
                            <label>Name</label>
                            <input type="text" name="name" value="{{ user_row.name if user_row else profile.name }}" required>
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input type="email" name="email" value="{{ user_row.email if user_row else profile.email }}" required>
                        </div>
                        <div class="field">
                            <label>Phone</label>
                            <input type="text" name="phone" value="{{ user_row.phone if user_row else profile.phone }}" required>
                        </div>
                        <div class="field">
                            <label>Address</label>
                            <input type="text" name="address" value="{{ user_row.address if user_row else profile.address }}" required>
                        </div>
                    </div>
                    <button type="submit" class="btn">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
